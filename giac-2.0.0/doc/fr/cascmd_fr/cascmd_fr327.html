<h3 id="sec430" class="subsection">6.25.7  Transformer les arccos en arcsin : <span style="font-family:monospace">acos2asin</span></h3>
<p><a id="hevea_default631"></a>
<span style="font-family:monospace">acos2asin</span> a comme argument une expression trigonométrique.<br>
<span style="font-family:monospace">acos2asin</span> transforme cette expression en remplaçant :<br>
arccos(<span style="font-style:italic">x</span>) par  π/2−arcsin(<span style="font-style:italic">x</span>).<br>
On tape :
</p><div class="center"><span style="font-family:monospace">acos2asin(acos(x)+asin(x))</span></div><p>
On obtient après simplification :
</p><div class="center"><span style="font-family:monospace">pi/2</span></div>
