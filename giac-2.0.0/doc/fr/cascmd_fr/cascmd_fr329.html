<h3 id="sec432" class="subsection">6.25.9  Transformer les arcsin en arccos : <span style="font-family:monospace">asin2acos</span></h3>
<p><a id="hevea_default633"></a>
<span style="font-family:monospace">asin2acos</span> a comme argument une expression trigonométrique.<br>
<span style="font-family:monospace">asin2acos</span> transforme cette expression en remplaçant :<br>
arcsin(<span style="font-style:italic">x</span>) par 
 π/2−arccos(<span style="font-style:italic">x</span>).<br>
On tape :
</p><div class="center"><span style="font-family:monospace">asin2acos(acos(x)+asin(x))</span></div><p>
On obtient après simplification :
</p><div class="center"><span style="font-family:monospace">pi/2</span></div>
