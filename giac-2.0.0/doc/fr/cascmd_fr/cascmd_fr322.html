<h3 id="sec425" class="subsection">6.25.2  Développer une expression trigonométriques : <span style="font-family:monospace">trigexpand</span></h3>
<p><a id="hevea_default621"></a>
<span style="font-family:monospace">trigexpand</span> a comme argument une expression trigonométrique.<br>
<span style="font-family:monospace">trigexpand</span> développe cette expression en fonction de sin(<span style="font-style:italic">x</span>) et 
cos(<span style="font-style:italic">x</span>).<br>
On tape :
</p><div class="center"><span style="font-family:monospace">trigexpand(cos(x+y))</span></div><p>
On obtient :
</p><div class="center"><span style="font-family:monospace">cos(x)*cos(y)-sin(x)*sin(y)</span></div>
