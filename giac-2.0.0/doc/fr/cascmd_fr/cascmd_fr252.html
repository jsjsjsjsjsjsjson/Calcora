<h3 id="sec329" class="subsection">6.12.7  Le nombre complexe normalisé : <span style="font-family:monospace">normalize unitV</span></h3>
<p><a id="hevea_default427"></a><a id="hevea_default428"></a>
<span style="font-family:monospace">normalize</span> ou <span style="font-family:monospace">unitV</span> a comme argument un nombre complexe.<br>
<span style="font-family:monospace">normalize</span> ou <span style="font-family:monospace">unitV</span> renvoie le nombre complexe divisé par le
module de ce nombre complexe.<br>
On tape :
</p><div class="center"><span style="font-family:monospace">normalize(3+4*i)</span></div><p>
On obtient :
</p><div class="center"><span style="font-family:monospace">(3+4*i)/5</span></div>
