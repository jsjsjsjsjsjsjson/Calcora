<h3 id="sec130" class="subsection">3.10.3  Tracé d’une droite verticale en 2-d : <span style="font-family:monospace">LineVert</span></h3>
<p><a id="hevea_default108"></a>
<span style="font-family:monospace">LineVert</span> a comme arguments une expression <span style="font-style:italic">Xpr</span>.<br>
 <span style="font-family:monospace">LineVert</span> trace la la droite verticale <span style="font-style:italic">x</span>=<span style="font-style:italic">Xpr</span>.<br>
On tape :
</p><div class="center"><span style="font-family:monospace">LineVert(1)</span></div><p>
On obtient :
</p><div class="center"><span style="font-family:monospace">le tracé de la droite x=1</span></div>
