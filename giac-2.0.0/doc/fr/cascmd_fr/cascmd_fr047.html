<h3 id="sec68" class="subsection">1.13.1  Fichier Mupad traduit en fichier <span style="font-family:monospace">Xcas</span> : <span style="font-family:monospace">mupad2xcas</span></h3>
<p><a id="hevea_default34"></a>
<span style="font-family:monospace">mupad2xcas</span> a comme argument un un nom de fichier qui contient 
un programme Mupad en mode texte.<br>
On tape :
</p><div class="center"><span style="font-family:monospace">mupad2xcas("fichier1","fichier2")</span></div><p>
On obtient :
</p><div class="center"><span style="font-family:monospace">la traduction de ce fichier en </span><span style="font-family:monospace">Xcas</span></div>
