<h3 id="sec109" class="subsection">2.6.5  Nom du répértoire en cours : <span style="font-family:monospace">GetFold</span></h3>
<p><a id="hevea_default85"></a>
<span style="font-family:monospace">GetFold</span> renvoie le nom du répértoire dans lequel on se 
trouve.
On tape par exemple dans <span style="font-family:monospace">Xcas</span> :
</p><div class="center"><span style="font-family:monospace">SetFold(toto)</span></div><p>
puis
</p><div class="center"><span style="font-family:monospace">GetFold()</span></div><p>
On obtient :
</p><div class="center"><span style="font-family:monospace">toto([])</span></div>
