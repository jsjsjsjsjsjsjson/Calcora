<h3 id="sec69" class="subsection">1.13.2  Fichier Mupad traduit en fichier Maple : <span style="font-family:monospace">mupad2maple</span></h3>
<p><a id="hevea_default35"></a>
<span style="font-family:monospace">mupad2maple</span> a comme argument un un nom de fichier qui contient
un programme Mupad en mode texte.<br>
On tape :
</p><div class="center"><span style="font-family:monospace">mupad2maple("fichier1","fichier2")</span></div><p>
On obtient :
</p><div class="center"><span style="font-family:monospace">la traduction de ce fichier en Maple</span></div>
